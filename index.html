<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selvas Treasury — 통합자금관리</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #3b82f6; --accent2: #60a5fa;
    --green: #10b981; --red: #ef4444; --amber: #f59e0b;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b; --card: #1a2035;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* 레이아웃 & 사이드바 */
  .layout { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .co { font-size: 11px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .sidebar-logo .name { font-size: 16px; font-weight: 700; color: var(--text); }
  .nav { padding: 12px 0; flex: 1; }
  .nav-section { font-size: 10px; color: var(--text3); padding: 12px 20px 6px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; color: var(--text2); font-size: 13px; border-left: 2px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .nav-item.active { background: rgba(59,130,246,.12); color: var(--accent2); border-left-color: var(--accent); }
  .nav-icon { width: 16px; opacity: .7; }

  /* 메인 콘텐츠 */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
  .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* 탭 UI */
  .company-tabs { display: flex; gap: 4px; background: var(--bg3); padding: 4px; border-radius: 10px; margin-bottom: 20px; width: fit-content; }
  .tab-btn { padding: 6px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* 카드 & 지표 */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .metric-value { font-size: 22px; font-weight: 700; }
  
  /* 공통 스타일 */
  .page { display: none; }
  .page.active { display: block; }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 9px 12px; border-radius: 8px; width: 100%; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="co">Selvas Healthcare</div><div class="name">Treasury</div></div>
    <nav class="nav">
      <div class="nav-section">메인</div>
      <div class="nav-item active" onclick="goto('dashboard')">Dashboard</div>
      <div class="nav-item" onclick="goto('input')">자금 입력</div>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar"><div id="page-title">Dashboard</div></div>
    <div class="content">
      
      <div class="page active" id="page-dashboard">
        <div class="company-tabs">
          <button class="tab-btn active" onclick="setCompany('A')">A사</button>
          <button class="tab-btn" onclick="setCompany('B')">B사</button>
          <button class="tab-btn" onclick="setCompany('C')">C사</button>
          <button class="tab-btn" onclick="setCompany('TOTAL')">통합</button>
        </div>

        <div class="metrics">
          <div class="metric"><div class="metric-label">원화 예금</div><div class="metric-value" id="m-krw-total">0</div></div>
          <div class="metric"><div class="metric-label">외화 환산</div><div class="metric-value" id="m-fx-total">0</div></div>
        </div>

        <div class="card">
          <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
      </div>

      <div class="page" id="page-input">
        <div class="card">
          <h3>자금 현황 입력</h3>
          <div class="form-grid">
            <div><label>기준일자</label><input type="date" id="i-date"></div>
            <div><label>보통예금 (원)</label><input type="text" id="i-krw" oninput="formatNumericInput(this)"></div>
          </div>
          <button class="btn btn-primary" onclick="saveData()">저장하기</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// 데이터 관리
const DB = {
  get: (k) => JSON.parse(localStorage.getItem(k) || '[]'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

let currentCompany = 'A';
let myChart = null;

// [기능 1] 숫자 콤마 포맷팅
function formatNumericInput(el, allowDecimal = false) {
  let value = el.value.replace(/,/g, '').replace(/[^\d.]/g, '');
  if (!allowDecimal) value = value.replace(/\./g, '');
  const parts = value.split('.');
  const intPart = parts[0] || (parts[1] ? '0' : '');
  const formattedInt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  el.value = parts[1] !== undefined ? `${formattedInt}.${parts[1]}` : formattedInt;
}

// [기능 2] 차트 렌더링
function renderChart(records) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (myChart) myChart.destroy();
  
  const filtered = currentCompany === 'TOTAL' ? records : records.filter(r => r.company === currentCompany);
  const labels = filtered.map(r => r.date);
  const data = filtered.map(r => r.krw);

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{ label: '보유 자금 추이', data: data, borderColor: '#3b82f6', tension: 0.3 }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function setCompany(co) {
  currentCompany = co;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(co)));
  renderDashboard();
}

function goto(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if(page === 'dashboard') renderDashboard();
}

function saveData() {
  const date = document.getElementById('i-date').value;
  const krw = parseFloat(document.getElementById('i-krw').value.replace(/,/g, '')) || 0;
  const records = DB.get('daily');
  records.push({ date, krw, company: currentCompany });
  DB.set('daily', records);
  alert('저장되었습니다.');
  goto('dashboard');
}

function renderDashboard() {
  const records = DB.get('daily');
  const filtered = currentCompany === 'TOTAL' ? records : records.filter(r => r.company === currentCompany);
  const total = filtered.reduce((s, r) => s + r.krw, 0);
  document.getElementById('m-krw-total').textContent = total.toLocaleString() + '원';
  renderChart(records);
}

window.onload = () => {
  document.getElementById('i-date').value = new Date().toISOString().slice(0,10);
  renderDashboard();
};
</script>
</body>
</html>
